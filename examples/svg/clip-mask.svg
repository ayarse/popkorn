<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <clipPath id="clip">
      <circle cx="100" cy="100" r="80" />
    </clipPath>
    <!-- Luminance mask: white reveals, black hides, greys partial. -->
    <mask id="fade" maskUnits="userSpaceOnUse" x="0" y="0" width="200" height="200">
      <rect x="0" y="0" width="200" height="200" fill="#000" />
      <rect x="20" y="20" width="160" height="160" fill="#fff" />
      <rect x="20" y="20" width="80"  height="160" fill="#777" />
    </mask>
  </defs>
  <g clip-path="url(#clip)">
    <rect x="0"  y="0" width="200" height="200" fill="#1e293b" />
    <g mask="url(#fade)">
      <rect x="0" y="0" width="200" height="200" fill="#22d3ee" />
    </g>
  </g>
</svg>
